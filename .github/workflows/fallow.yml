# Fallow — codebase intelligence for TypeScript/JavaScript: unused code,
# duplication, complexity, circular deps, architecture boundaries, and more.
#
# Docs: https://docs.fallow.tools
# Source: https://github.com/fallow-rs/fallow

name: Fallow

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: fallow-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fallow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fallow audit
        run: bun run fallow audit --base origin/main --format github-annotations
